name: Release plugin
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install
      - run: npm run build
      - name: Pack artifact (Python plugin → include backend + requirements.txt)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ID=$(jq -r .id plugin.json)
          mkdir -p out
          tar -czf "out/${ID}-${VERSION}.tgz" \
            dist plugin.json package.json backend requirements.txt
      - name: Create release + upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.tgz
